# Délais plus longs si le téléchargement Gradle est lent ou instable (SocketException côté wrapper).
systemProp.org.gradle.internal.http.socketTimeout=180000
systemProp.org.gradle.internal.http.connectionTimeout=180000
systemProp.https.protocols=TLSv1.2,TLSv1.3

# Éviter -Xmx8G sur une machine 8–16 Go : la RAM saturée peut couper les téléchargements (SocketException « hôte »).
org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
# Moins de concurrence = moins de verrous fichiers sur Windows (Gradle + antivirus).
org.gradle.parallel=false
org.gradle.caching=true
org.gradle.vfs.watch=false
android.useAndroidX=true
